ServerName localhost

<Directory /var/www/html>
    Options -Indexes
    AllowOverride All
    Require all granted
</Directory>

# Esta regla sigue activa aunque Railway monte un volumen sobre uploads.
<Directory /var/www/html/backend/uploads>
    Options -Indexes
    AllowOverride None
    <FilesMatch "\.(php|phtml|phar|php[0-9]*)$">
        Require all denied
    </FilesMatch>
</Directory>

